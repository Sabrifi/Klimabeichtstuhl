<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Der Klimabeichtstuhl</title>
<style>
body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;padding:20px;line-height:1.5}
.card{border:1px solid #ccc;border-radius:10px;padding:20px}
button{display:block;width:100%;margin:8px 0;padding:12px;font-size:16px;cursor:pointer}
h1,h2{text-align:center}
</style>
</head>
<body>
<div class="card">
<h1>Der Klimabeichtstuhl</h1>
<div id="app"></div>
</div>

<script>
const questions=[
{
text:"Wie oft nutzt du pro Woche das Auto für kurze Strecken (unter 2 km)?",
options:[["Nie",0],["Selten",1],["Oft",2],["Sehr oft",3]]
},
{
text:"Wie häufig isst du fleischhaltige Mahlzeiten pro Woche?",
options:[["Nie",0],["1–2 Mal",1],["3–5 Mal",2],["Täglich",3]]
},
{
text:"Wie oft fliegst du pro Jahr?",
options:[["Nie",0],["1 Mal",2],["2–3 Mal",3],["Mehr als 3 Mal",4]]
}
];

let current=0;
let score=0;

function absolution(s){
 if(s<=2) return "Absolution erteilt. Du darfst heute mit gutem Gewissen einen Kaffee genießen.";
 if(s<=5) return "Bußauflage: 5 Mal Treppensteigen oder 30 Minuten Fahrradfahren.";
 if(s<=8) return "Bußauflage: 1 Stunde Fahrradfahren oder eine Woche fleischfrei leben.";
 return "Bußauflage: 2 Stunden Fahrradfahren und eine Woche bewusster Konsum ohne Neuanschaffungen.";
}

function render(){
 const app=document.getElementById("app");
 if(current>=questions.length){
   app.innerHTML=`<h2>Deine Absolution</h2>
   <p>${absolution(score)}</p>
   <button onclick="restart()">Neue Beichte</button>`;
   return;
 }
 const q=questions[current];
 let html=`<p><strong>${q.text}</strong></p>`;
 q.options.forEach(o=>{
   html+=`<button onclick="answer(${o[1]})">${o[0]}</button>`;
 });
 app.innerHTML=html;
}

function answer(points){
 score+=points;
 current++;
 render();
}

function restart(){
 current=0;
 score=0;
 render();
}

render();
</script>
</body>
</html>
